[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"
  # Required runtime secrets (set real values in Netlify UI)
  NUXT_SUPABASE_URL = ""
  NUXT_SUPABASE_SERVICE_ROLE_KEY = ""
  NUXT_ADMIN_SESSION_SECRET = ""
  NUXT_COOKIE_SECURE = "true"
  NUXT_PUBLIC_API_BASE = "https://api.turgunovsardor.uz"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  port = 8888
  publish = "dist"
  targetPort = 3000

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
